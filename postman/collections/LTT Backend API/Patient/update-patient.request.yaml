$kind: http-request
name: 'Update Patient (Admin)'
method: PATCH
url: '{{baseUrl}}/patient/{{patientId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: session-token
    value: '{{sessionToken}}'
body:
  type: json
  content: |-
    {
      "full_name": "Jane Doe",
      "gender": "Female",
      "age": 28,
      "job": "Doctor",
      "address": "456 Oak Ave",
      "phone_number": ["081234567891"],
      "health_history": "Hypertension",
      "surgery_history": "",
      "patient_code": "",
      "email": "jane@example.com",
      "password": ""
    }
