$kind: http-request
name: Update Current User
method: PATCH
url: '{{baseUrl}}/user'
order: 6000
headers:
  - key: Content-Type
    value: application/json
  - key: session-token
    value: '{{sessionToken}}'
body:
  type: json
  content: |-
    {
      "name": "Updated Name",
      "email": "updated@example.com",
      "password": "newpassword123"
    }
