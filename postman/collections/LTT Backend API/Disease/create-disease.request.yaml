$kind: http-request
name: Create Disease
method: POST
url: '{{baseUrl}}/disease'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: session-token
    value: '{{sessionToken}}'
body:
  type: json
  content: |-
    {
      "name": "Diabetes",
      "codename": "diabetes",
      "description": "A metabolic disease"
    }
