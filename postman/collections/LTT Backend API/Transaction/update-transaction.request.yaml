$kind: http-request
name: Edit Transaction
method: PATCH
url: '{{baseUrl}}/transaction/{{transactionId}}'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: session-token
    value: '{{sessionToken}}'
body:
  type: json
  content: |-
    {
      "remarks": "Adjusted after adding items",
      "payment_method": "cash",
      "payment_status": "partial",
      "items": [
        {
          "item_id": 1,
          "quantity": 2
        },
        {
          "item_id": 3,
          "quantity": 1
        }
      ]
    }
